# .github/workflows/static.yml
# ─────────────────────────────────────────────────────────────────────────────
# Star Raise — Automatic Web Deployment via pygbag + GitHub Pages
#
# Trigger  : every push to `main`
# Build    : python -m pygbag --build --no_opt .
# Deploy   : build/web/ → gh-pages branch → GitHub Pages
#
# Live URL after first deploy:
#   https://atopatt7.github.io/star_raise/
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN write access to gh-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy runs at a time; new pushes cancel the in-progress run
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ── 1. Build ─────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: pip install pygbag

      - name: Build with pygbag
        run: python -m pygbag --build --no_opt .
        # Output lands in build/web/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  # ── 2. Deploy ────────────────────────────────────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
