name: Deploy Pygame Web to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; new pushes cancel the queued run but never
# interrupt a deployment that is already in progress.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pygame==2.6.1 pygbag

      - name: Download Chinese font (Zpix)
        run: |
          mkdir -p assets/fonts
          curl -fL -o assets/fonts/NotoSansTC.ttf \
            "https://github.com/SolidZORO/zpix-pixel-font/releases/download/v3.1.11/zpix.ttf"

      - name: Build with pygbag
        # --build   : headless / CI mode (no dev server)
        # --no_opt  : skip JS minification (avoids mangling async coroutines)
        # --ume_block=0 : disable user-media block (not needed for this game)
        # Target the project root so pygbag finds main.py automatically
        run: python -m pygbag --build --no_opt --ume_block=0 .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # pygbag always writes output to build/web relative to the build target
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
